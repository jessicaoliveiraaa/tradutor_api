<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Tradução e Pronúncia</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <button id="btnTema" class="btn-theme" title="Alternar Modo Escuro/Claro">
        <i class="fas fa-moon"></i>
    </button>

    <main class="app-container">
        <header>
            <h1>Tradutor Interativo</h1>
            <p>Aprenda a pronúncia exata de palavras e diálogos longos.</p>
        </header>

        <section class="translator-grid">
            <div class="input-area">
                <div class="controls-header">
                    <div class="lang-box">
                        <label for="idiomaOrigem">De:</label>
                        <select id="idiomaOrigem" class="lang-select">
                            <option value="Automático" selected>Detectar Automático 🪄</option>
                            <option value="Português">Português</option>
                            <option value="Inglês">Inglês</option>
                            <option value="Espanhol">Espanhol</option>
                            <option value="Japonês">Japonês</option>
                            <option value="Russo">Russo</option>
                            <option value="Coreano">Coreano</option>
                            <option value="Francês">Francês</option>
                            <option value="Alemão">Alemão</option>
                        </select>
                    </div>

                    <button id="btnInverter" class="btn-swap" title="Inverter idiomas">
                        <i class="fas fa-exchange-alt"></i>
                    </button>

                    <div class="lang-box">
                        <label for="idiomaDestino">Para:</label>
                        <select id="idiomaDestino" class="lang-select">
                            <option value="Inglês" selected>Inglês</option>
                            <option value="Português">Português</option>
                            <option value="Espanhol">Espanhol</option>
                            <option value="Japonês">Japonês</option>
                            <option value="Russo">Russo</option>
                            <option value="Coreano">Coreano</option>
                            <option value="Francês">Francês</option>
                            <option value="Alemão">Alemão</option>
                        </select>
                    </div>
                </div>

                <textarea id="textoPt" placeholder="Digite suas frases ou palavras aqui..."></textarea>
                <button id="btnTraduzir" class="btn-primary">Traduzir Rápido</button>
            </div>

            <div class="output-area">
                <div class="result-box">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span class="label" style="margin-bottom: 0;">Tradução:</span>
                        <span id="badgeContexto" class="badge-contexto" style="display: none;">Uso Comum</span>
                    </div>
                    <p id="textoTraduzido" class="result-text"></p>
                </div>

                <div class="result-box">
                    <span class="label">Como se fala (Aportuguesado):</span>
                    <p id="textoPronuncia" class="result-text"></p>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label for="velocidadeVoz" class="label" style="margin-bottom: 0;">Velocidade:</label>
                    <select id="velocidadeVoz" class="lang-select" style="width: 50%; padding: 8px;">
                        <option value="1.0" selected>Normal (1x) 🗣️</option>
                        <option value="0.6">Estudo (0.6x) 🐢</option>
                    </select>
                </div>

                <button id="btnAudio" class="btn-audio" disabled>
                    <i class="fas fa-volume-up"></i> Ouvir Pronúncia
                </button>

                <div class="voice-practice-area">
                    <span class="label">Teste sua pronúncia:</span>
                    <button id="btnGravar" class="btn-mic">
                        <i class="fas fa-microphone"></i> Pressione para Falar
                    </button>
                    <p id="feedbackPronuncia" class="feedback-text"></p>
                </div>

                <button id="btnFavoritar" class="btn-favoritar" disabled>
                    <i class="fas fa-bookmark"></i> Salvar no Caderno
                </button>
            </div>
        </section>

        <section class="notebook-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                <h2 style="color: var(--primary-color);">
                    <i class="fas fa-book-open"></i> Meu Caderno
                </h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="qtdCartas" class="lang-select" style="padding: 10px; border-radius: 8px; width: auto;">
                        <option value="5">5 cartas</option>
                        <option value="10" selected>10 cartas</option>
                        <option value="15">15 cartas</option>
                    </select>
                    <button id="btnGerarDeck" class="btn-secundary">
                        <i class="fas fa-magic"></i> Gerar Cartas
                    </button>
                    <button id="btnJogar" class="btn-jogar">
                        <i class="fas fa-gamepad"></i> Jogar!
                    </button>
                </div>
            </div>
            <div id="listaCaderno" class="flashcards-grid"></div>
        </section>
        
    </main>

    <div id="modalGame" class="modal-overlay">
        <div class="modal-content">
            <button id="btnFecharGame" class="btn-fechar">&times;</button>
            <h3 style="color: var(--text-main); margin-bottom: 5px;">Modo Prática 🎯</h3>
            <div class="scoreboard">
                <span class="score-verde">✅ <span id="placarAcertos">0</span></span>
                <span class="score-vermelho">❌ <span id="placarErros">0</span></span>
            </div>
            
            <div class="game-card">
                <span id="gameIdioma" class="fc-lang" style="display: block; text-align: center;"></span>
                <p id="gameOriginal" class="fc-orig" style="text-align: center; font-size: 1.2rem; margin: 15px 0;"></p>
                <div class="game-actions">
                    <button id="btnGameOuvir" class="btn-audio" style="width: auto; padding: 10px 20px;"><i class="fas fa-volume-up"></i> Dica</button>
                    <button id="btnGameFalar" class="btn-mic" style="width: auto; padding: 10px 20px; margin-bottom: 0;"><i class="fas fa-microphone"></i> Falar</button>
                </div>
                <p id="gameFeedback" class="feedback-text" style="margin-top: 15px; font-weight: bold; font-size: 1.1rem;"></p>
            </div>
            <button id="btnProxCarta" class="btn-primary" style="margin-top: 20px; display: none;">Próxima Carta <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
