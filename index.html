<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Tradução e Pronúncia</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container">
        <header>
            <h1>Tradutor Interativo</h1>
            <p>Aprenda a pronúncia exata de palavras e diálogos longos.</p>
        </header>

        <section class="translator-grid">
            <div class="input-area">
                <div class="controls-header">
                    <div class="lang-box">
                        <label for="idiomaOrigem">De:</label>
                        <select id="idiomaOrigem" class="lang-select">
                            <option value="Automático" selected>Detectar Automático 🪄</option>
                            <option value="Português">Português</option>
                            <option value="Inglês">Inglês</option>
                            <option value="Espanhol">Espanhol</option>
                            <option value="Japonês">Japonês</option>
                            <option value="Russo">Russo</option>
                            <option value="Coreano">Coreano</option>
                            <option value="Francês">Francês</option>
                            <option value="Alemão">Alemão</option>
                        </select>
                    </div>

                    <button id="btnInverter" class="btn-swap" title="Inverter idiomas">
                        <i class="fas fa-exchange-alt"></i>
                    </button>

                    <div class="lang-box">
                        <label for="idiomaDestino">Para:</label>
                        <select id="idiomaDestino" class="lang-select">
                            <option value="Inglês" selected>Inglês</option>
                            <option value="Português">Português</option>
                            <option value="Espanhol">Espanhol</option>
                            <option value="Japonês">Japonês</option>
                            <option value="Russo">Russo</option>
                            <option value="Coreano">Coreano</option>
                            <option value="Francês">Francês</option>
                            <option value="Alemão">Alemão</option>
                        </select>
                    </div>
                </div>

                <textarea id="textoPt" placeholder="Digite suas frases, palavras ou diálogos aqui..."></textarea>
                <button id="btnTraduzir" class="btn-primary">Traduzir Rápido</button>
            </div>

            <div class="output-area">
                <div class="result-box">
                    <span class="label">Tradução:</span>
                    <p id="textoTraduzido" class="result-text"></p>
                </div>

                <div class="result-box">
                    <span class="label">Como se fala (Aportuguesado):</span>
                    <p id="textoPronuncia" class="result-text"></p>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label for="velocidadeVoz" class="label" style="margin-bottom: 0;">Velocidade da Voz:</label>
                    <select id="velocidadeVoz" class="lang-select" style="width: 50%; padding: 8px;">
                        <option value="1.0" selected>Normal (1x) 🗣️</option>
                        <option value="0.6">Estudo (0.6x) 🐢</option>
                    </select>
                </div>

                <button id="btnAudio" class="btn-audio" disabled>
                    <i class="fas fa-volume-up"></i> Ouvir Pronúncia Suave
                </button>

                <div class="voice-practice-area" style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0;">
                    <span class="label">Teste sua pronúncia:</span>
                    <button id="btnGravar" class="btn-mic">
                        <i class="fas fa-microphone"></i> Pressione para Falar
                    </button>
                    <p id="feedbackPronuncia" class="feedback-text" style="margin-top: 10px; font-size: 0.95rem; text-align: center; min-height: 24px;"></p>
                </div>

                <button id="btnFavoritar" class="btn-favoritar" disabled style="margin-top: 15px;">
                    <i class="fas fa-bookmark"></i> Salvar no Caderno
                </button>
            </div>
        </section>

        <section class="notebook-section" style="margin-top: 40px; padding-top: 20px; border-top: 2px dashed #e2e8f0;">
            <h2 style="color: var(--primary-color); margin-bottom: 20px;">
                <i class="fas fa-book-open"></i> Meu Caderno de Vocabulário
            </h2>
            <div id="listaCaderno" class="flashcards-grid">
                </div>
        </section>
        
    </main>

    <script src="scripts.js"></script>
</body>
</html>
